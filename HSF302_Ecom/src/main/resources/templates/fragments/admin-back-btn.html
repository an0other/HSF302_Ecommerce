<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
    ── Admin Back Button Fragment ─────────────────────────────────────────────
    Usage: add this anywhere inside <body> on any store page:

        <div th:replace="~{fragments/admin-back-btn :: adminBackBtn}"></div>

    It renders nothing for non-admin users.
    ─────────────────────────────────────────────────────────────────────────── -->

<th:block th:fragment="adminBackBtn">
    <th:block th:if="${session.loggedInUser != null and session.loggedInUser.role.name() == 'ADMIN'}">
        <style>
            .admin-back-btn {
                position: fixed;
                bottom: 28px;
                left: 28px;
                z-index: 999;
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 10px 18px;
                font-family: 'Syne', var(--font-display, sans-serif);
                font-size: 13px;
                font-weight: 700;
                letter-spacing: .01em;
                color: #fff;
                background: #0d0d0d;
                border: none;
                border-radius: 9999px;
                text-decoration: none;
                cursor: pointer;
                box-shadow: 0 4px 20px rgba(0,0,0,.25);
                transition: background 140ms ease, transform 140ms ease, box-shadow 140ms ease;
                white-space: nowrap;
            }
            .admin-back-btn:hover {
                background: #1a1a14;
                transform: translateY(-2px);
                box-shadow: 0 8px 28px rgba(0,0,0,.3);
            }
            .admin-back-btn:active { transform: scale(.97); }
            .admin-back-btn-dot {
                width: 7px; height: 7px;
                border-radius: 50%;
                background: #e8441a;
                flex-shrink: 0;
            }
        </style>
        <a href="/admin" class="admin-back-btn">
            <span class="admin-back-btn-dot"></span>
            Admin Panel
        </a>
    </th:block>
</th:block>

</body>
</html>
