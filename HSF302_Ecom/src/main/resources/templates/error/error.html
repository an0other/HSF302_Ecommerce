<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${status} + ' — Voltex'">Error — Voltex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/indexstyle.css}"/>
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--clr-bg);
            padding: var(--space-8);
            text-align: center;
        }

        .error-code {
            font-family: var(--font-display);
            font-size: clamp(96px, 20vw, 180px);
            font-weight: 800;
            letter-spacing: -.06em;
            line-height: 1;
            color: var(--clr-accent);
            user-select: none;
            margin-bottom: var(--space-4);
        }

        .error-title {
            font-family: var(--font-display);
            font-size: clamp(22px, 4vw, 32px);
            font-weight: 800;
            letter-spacing: -.03em;
            color: var(--clr-text-primary);
            margin-bottom: var(--space-4);
        }

        .error-message {
            font-size: 15px;
            color: var(--clr-text-muted);
            font-weight: 300;
            line-height: 1.7;
            max-width: 440px;
            margin-bottom: var(--space-10);
        }


        .error-actions {
            display: flex;
            gap: var(--space-3);
            flex-wrap: wrap;
            justify-content: center;
        }

        .error-btn-primary {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: 13px 28px;
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            background: var(--clr-accent);
            border: none;
            border-radius: var(--radius-full);
            text-decoration: none;
            cursor: pointer;
            transition: background var(--duration-normal) var(--ease-out),
            transform var(--duration-fast),
            box-shadow var(--duration-normal) var(--ease-out);
        }
        .error-btn-primary:hover {
            background: var(--clr-accent-hover);
            box-shadow: 0 8px 24px rgba(232,68,26,.35);
            transform: translateY(-1px);
        }

        .error-btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: 13px 28px;
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            color: var(--clr-text-secondary);
            background: transparent;
            border: 1.5px solid var(--clr-border);
            border-radius: var(--radius-full);
            text-decoration: none;
            cursor: pointer;
            transition: all var(--duration-fast);
        }
        .error-btn-ghost:hover {
            background: var(--clr-surface-alt);
            border-color: var(--clr-text-muted);
            color: var(--clr-text-primary);
        }

        .error-logo {
            position: fixed;
            top: 24px;
            left: 32px;
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -.03em;
            text-decoration: none;
        }
        .logo-volt { color: var(--clr-text-primary); }
        .logo-ex   { color: var(--clr-accent); }
    </style>
</head>
<body>

<a href="/" class="error-logo">
    <span class="logo-volt">VOLT</span><span class="logo-ex">EX</span>
</a>

<div class="error-page">

    <div class="error-code" th:text="${status ?: 500}">500</div>

    <h1 class="error-title" th:text="${error ?: 'Something Went Wrong'}">Something Went Wrong</h1>

    <p class="error-message" th:text="${message ?: 'An unexpected error occurred. Please try again.'}">
        An unexpected error occurred.
    </p>


    <div class="error-actions">
        <a href="/" class="error-btn-primary">Go to Homepage</a>
        <a href="javascript:history.back()" class="error-btn-ghost">Go Back</a>
    </div>

</div>

</body>
</html>
