<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders — Voltex</title>
    <link rel="stylesheet" th:href="@{/css/indexstyle.css}" />
    <link rel="stylesheet" th:href="@{/css/orders.css}" />
</head>
<body>

<main class="orders-main">
    <div class="orders-container">

        <div class="orders-breadcrumb">
            <a href="/" class="breadcrumb-link">Home</a>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-current">My Orders</span>
        </div>

        <div class="orders-title-row">
            <div>
                <h1 class="orders-title">My Orders</h1>
                <p class="orders-count" th:text="${#lists.size(orders)} + ' orders found'">0 orders found</p>
            </div>
        </div>

        <div class="orders-empty" th:if="${#lists.isEmpty(orders)}">
            <h3>No orders yet</h3>
            <p>You have not placed any orders yet.</p>
            <a href="/products" class="orders-shop-btn">Continue Shopping</a>
        </div>

        <div class="orders-list" th:if="${!#lists.isEmpty(orders)}">
            <div class="order-card" th:each="order : ${orders}">
                <div class="order-card-top">
                    <div>
                        <div class="order-label">Order ID</div>
                        <div class="order-value" th:text="'#' + ${order.id}">#1</div>
                    </div>
                    <div>
                        <div class="order-label">Created At</div>
                        <div class="order-value"
                             th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">15/03/2026 10:30</div>
                    </div>
                    <div>
                        <div class="order-label">Status</div>
                        <div class="order-status" th:text="${order.status}">PENDING</div>
                    </div>
                    <div>
                        <div class="order-label">Total Price</div>
                        <div class="order-price"
                             th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                            1,000,000 ₫
                        </div>
                    </div>
                </div>

                <div class="order-card-bottom">
                    <a th:href="@{/orders/{id}(id=${order.id})}" class="order-view-btn">View Detail</a>
                </div>
            </div>
        </div>

    </div>
</main>

</body>
</html>
