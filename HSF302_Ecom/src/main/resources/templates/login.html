<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login — Voltex</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-page">

<div class="auth-wrapper">
    <div class="auth-card">
        <a href="/" class="auth-brand">
            <span class="logo-volt">VOLT</span><span class="logo-ex">EX</span>
        </a>

        <h2 class="auth-title">Đăng nhập</h2>
        <p class="auth-subtitle">Đăng nhập để tiếp tục mua sắm tại Voltex.</p>

        <div th:if="${error}" th:text="${error}" class="auth-alert auth-alert--error"></div>

        <div th:if="${param.registered}" class="auth-alert auth-alert--success">
            Đăng ký thành công, hãy đăng nhập
        </div>

        <div th:if="${param.logout}" class="auth-alert auth-alert--success">
            Bạn đã đăng xuất thành công
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div class="auth-group">
                <label for="email" class="auth-label">Email</label>
                <input type="text" id="email" name="email" class="auth-input" placeholder="Nhập email">
            </div>

            <div class="auth-group">
                <label for="pass" class="auth-label">Password</label>
                <input type="password" id="pass" name="password" class="auth-input" placeholder="Nhập mật khẩu">
            </div>

            <button type="submit" class="auth-btn">Login</button>
        </form>

        <div class="auth-footer">
            Chưa có tài khoản?
            <a th:href="@{/register}" class="auth-link">Đăng ký</a>
        </div>
    </div>
</div>

</body>
</html>
