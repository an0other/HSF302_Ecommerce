<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change Password</title>
</head>
<body>

<h2>Đổi mật khẩu</h2>

<div th:if="${error}" style="color:red" th:text="${error}"></div>
<div th:if="${success}" style="color:green" th:text="${success}"></div>

<form th:action="@{/change-password}" method="post" th:object="${changePasswordRequest}">

    <label>Mật khẩu cũ</label>
    <input type="password" th:field="*{oldPassword}">

    <label>Mật khẩu mới</label>
    <input type="password" th:field="*{newPassword}">

    <label>Xác nhận mật khẩu</label>
    <input type="password" th:field="*{confirmPassword}">

    <button type="submit">Đổi mật khẩu</button>

</form>

</body>
</html>
