<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::title}, 'Inventory', ~{::main})}">
<head><title>Inventory — Voltex Admin</title></head>
<body>
<main>

    <div class="adm-page-header">
        <div>
            <h1 class="adm-page-title">Inventory</h1>
            <p class="adm-page-sub" th:text="${inventoryPage.totalElements} + ' variant(s) tracked'">0 variants</p>
        </div>
    </div>

    <!-- Filters -->
    <form th:action="@{/admin/inventory}" method="get" class="adm-search-bar adm-search-bar--multi">
        <div class="adm-search-wrap">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" name="keyword" th:value="${keyword}" class="adm-search-input" placeholder="Search product, color, spec, brand…" />
        </div>
        <select name="categoryId" class="adm-select">
            <option value="">All Categories</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat.id}" th:text="${cat.name}"
                    th:selected="${categoryId != null and categoryId == cat.id}">Category</option>
        </select>
        <select name="brandId" class="adm-select">
            <option value="">All Brands</option>
            <option th:each="b : ${brands}"
                    th:value="${b.id}" th:text="${b.name}"
                    th:selected="${brandId != null and brandId == b.id}">Brand</option>
        </select>
        <button type="submit" class="adm-btn adm-btn--ghost">Filter</button>
        <a th:href="@{/admin/inventory}" class="adm-btn adm-btn--ghost">Reset</a>
    </form>

    <!-- Table -->
    <div class="adm-table-card">
        <table class="adm-table adm-table--inventory">
            <thead>
            <tr>
                <th>Product</th>
                <th>Variant</th>
                <th>Category / Brand</th>
                <th>Price</th>
                <th class="adm-th-center">Stock</th>
                <th class="adm-th-center">Reserved</th>
                <th class="adm-th-center">Available</th>
                <th class="adm-th-center">Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(inventoryPage.content)}">
                <td colspan="9" class="adm-table-empty">No inventory records found.</td>
            </tr>
            <tr th:each="row : ${inventoryPage.content}"
                th:classappend="${row.stockStatus == 'OUT'} ? ' adm-row--danger' : (${row.stockStatus == 'LOW'} ? ' adm-row--warn' : '')">
                <td>
                    <a th:href="@{/products/{id}(id=${row.productId})}" target="_blank"
                       class="adm-table-name adm-table-name--link" th:text="${row.productName}">Product</a>
                </td>
                <td>
                    <div class="adm-variant-label">
                        <span class="adm-variant-color" th:text="${row.color}">Color</span>
                        <span class="adm-variant-sep">/</span>
                        <span class="adm-variant-spec" th:text="${row.spec}">Spec</span>
                    </div>
                </td>
                <td>
                    <div class="adm-meta-stack">
                        <span th:text="${row.categoryName}">Cat</span>
                        <span class="adm-meta-sep">·</span>
                        <span th:text="${row.brandName}">Brand</span>
                    </div>
                </td>
                <td>
                    <span class="adm-price" th:text="${row.priceFormatted}">0 ₫</span>
                </td>
                <td class="adm-td-center adm-mono" th:text="${row.stock}">0</td>
                <td class="adm-td-center adm-mono" th:text="${row.reserved}">0</td>
                <td class="adm-td-center adm-mono adm-avail"
                    th:classappend="${row.stockStatus == 'OUT'} ? ' adm-avail--out' : (${row.stockStatus == 'LOW'} ? ' adm-avail--low' : ' adm-avail--ok')"
                    th:text="${row.available}">0</td>
                <td class="adm-td-center">
                    <span th:if="${row.stockStatus == 'OUT'}" class="adm-badge adm-badge--red">Out</span>
                    <span th:if="${row.stockStatus == 'LOW'}" class="adm-badge adm-badge--warn">Low</span>
                    <span th:if="${row.stockStatus == 'OK'}"  class="adm-badge adm-badge--green">OK</span>
                </td>
                <td>
                    <div class="adm-table-actions">
                        <!-- Edit full inventory -->
                        <a th:href="@{/admin/inventory/{id}/edit(id=${row.variantId})}"
                           class="adm-action-btn" title="Edit inventory">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </a>
                        <!-- Quick restock -->
                        <button type="button"
                                class="adm-action-btn adm-action-btn--green"
                                title="Quick restock"
                                th:data-variant-id="${row.variantId}"
                                th:data-product-name="${row.productName}"
                                onclick="openRestockModal(this)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div th:if="${inventoryPage.totalPages > 1}" class="adm-pagination">
        <a th:if="${currentPage > 0}"
           th:href="@{/admin/inventory(page=${currentPage - 1}, keyword=${keyword}, categoryId=${categoryId}, brandId=${brandId})}"
           class="adm-page-btn">← Prev</a>
        <th:block th:each="i : ${#numbers.sequence(0, inventoryPage.totalPages - 1)}">
            <a th:href="@{/admin/inventory(page=${i}, keyword=${keyword}, categoryId=${categoryId}, brandId=${brandId})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? ' adm-page-btn--active'"
               class="adm-page-btn">1</a>
        </th:block>
        <a th:if="${currentPage < inventoryPage.totalPages - 1}"
           th:href="@{/admin/inventory(page=${currentPage + 1}, keyword=${keyword}, categoryId=${categoryId}, brandId=${brandId})}"
           class="adm-page-btn">Next →</a>
    </div>

    <!-- Restock modal -->
    <div class="adm-modal-overlay" id="restockModal" style="display:none">
        <div class="adm-modal">
            <div class="adm-modal-header">
                <h3 class="adm-modal-title">Quick Restock</h3>
                <button class="adm-modal-close" onclick="closeRestockModal()">&#x2715;</button>
            </div>
            <p class="adm-modal-sub" id="restockProductName">Product</p>
            <form id="restockForm" method="post">
                <div class="adm-form-field">
                    <label class="adm-form-label" for="restockAmount">Units to Add <span class="adm-required">*</span></label>
                    <input type="number" id="restockAmount" name="amount" min="1" value="10" class="adm-input" />
                </div>
                <div class="adm-form-actions">
                    <button type="submit" class="adm-btn adm-btn--primary">Add to Stock</button>
                    <button type="button" class="adm-btn adm-btn--ghost" onclick="closeRestockModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openRestockModal(btn) {
            const variantId   = btn.dataset.variantId;
            const productName = btn.dataset.productName;
            document.getElementById('restockProductName').textContent = productName;
            document.getElementById('restockForm').action = '/admin/inventory/' + variantId + '/restock';
            document.getElementById('restockModal').style.display = 'flex';
            document.getElementById('restockAmount').focus();
        }
        function closeRestockModal() {
            document.getElementById('restockModal').style.display = 'none';
        }
        document.getElementById('restockModal').addEventListener('click', function(e) {
            if (e.target === this) closeRestockModal();
        });
    </script>

</main>
</body>
</html>
