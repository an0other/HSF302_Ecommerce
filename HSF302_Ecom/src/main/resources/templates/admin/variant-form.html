<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::title}, 'Products', ~{::main})}">
<head>
    <title th:text="${isEdit} ? 'Edit Variant — Voltex Admin' : 'New Variant — Voltex Admin'">Variant Form</title>
</head>
<body>
<main>

    <!-- Breadcrumb -->
    <div th:replace="~{admin/fragments/product-breadcrumb :: breadcrumb('variants', ${product}, null, null)}"></div>

    <div class="adm-page-header">
        <div>
            <h1 class="adm-page-title" th:text="${isEdit} ? 'Edit Variant' : 'New Variant'">Variant</h1>
            <p class="adm-page-sub" th:text="${isEdit} ? 'Update variant details' : 'Add a new variant for ' + ${product.name}">—</p>
        </div>
        <a th:href="@{/admin/products/{id}/variants(id=${product.id})}" class="adm-btn adm-btn--ghost">← Back to Variants</a>
    </div>

    <div class="adm-form-card" style="max-width:560px;">

        <div class="adm-form-error" th:if="${formError}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span th:text="${formError}"></span>
        </div>

        <!-- EDIT form -->
        <form th:if="${isEdit}"
              th:action="@{/admin/products/{pid}/variants/{vid}/edit(pid=${product.id},vid=${variantId})}"
              th:object="${variantForm}" method="post" class="adm-form">

            <div class="adm-form-row">
                <div class="adm-form-field">
                    <label class="adm-form-label" for="colorE">Color <span class="adm-required">*</span></label>
                    <input type="text" id="colorE" th:field="*{color}"
                           th:classappend="${#fields.hasErrors('color')} ? ' adm-input--error'"
                           class="adm-input" placeholder="e.g. Space Black" autofocus />
                    <span class="adm-field-error" th:if="${#fields.hasErrors('color')}" th:errors="*{color}"></span>
                </div>
                <div class="adm-form-field">
                    <label class="adm-form-label" for="specE">Spec <span class="adm-required">*</span></label>
                    <input type="text" id="specE" th:field="*{spec}"
                           th:classappend="${#fields.hasErrors('spec')} ? ' adm-input--error'"
                           class="adm-input" placeholder="e.g. 256GB" />
                    <span class="adm-field-error" th:if="${#fields.hasErrors('spec')}" th:errors="*{spec}"></span>
                </div>
            </div>

            <div class="adm-form-field">
                <label class="adm-form-label" for="priceE">Price (₫) <span class="adm-required">*</span></label>
                <input type="number" id="priceE" th:field="*{price}"
                       th:classappend="${#fields.hasErrors('price')} ? ' adm-input--error'"
                       class="adm-input adm-input--mono" placeholder="e.g. 28990000" min="1" step="any" />
                <span class="adm-field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
            </div>

            <div class="adm-form-field">
                <label class="adm-form-label">Status</label>
                <div class="adm-toggle-group">
                    <label class="adm-toggle-opt">
                        <input type="radio" th:field="*{status}" th:value="${true}" />
                        <span class="adm-toggle-label adm-toggle-label--green">Active</span>
                    </label>
                    <label class="adm-toggle-opt" th:classappend="${hasActiveStock} ? ' adm-toggle-opt--locked'">
                        <input type="radio" th:field="*{status}" th:value="${false}" th:disabled="${hasActiveStock}" />
                        <span class="adm-toggle-label adm-toggle-label--red">Inactive</span>
                    </label>
                </div>
                <span th:if="${hasActiveStock}" class="adm-field-hint adm-field-hint--warn">
                    Cannot deactivate — this variant still has available stock in inventory.
                </span>
            </div>

            <div class="adm-form-actions">
                <button type="submit" class="adm-btn adm-btn--primary">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    Save Changes
                </button>
                <a th:href="@{/admin/products/{id}/variants(id=${product.id})}" class="adm-btn adm-btn--ghost">Cancel</a>
            </div>
        </form>

        <!-- CREATE form -->
        <form th:unless="${isEdit}"
              th:action="@{/admin/products/{id}/variants/new(id=${product.id})}"
              th:object="${variantForm}" method="post" class="adm-form">

            <div class="adm-form-row">
                <div class="adm-form-field">
                    <label class="adm-form-label" for="colorN">Color <span class="adm-required">*</span></label>
                    <input type="text" id="colorN" th:field="*{color}"
                           th:classappend="${#fields.hasErrors('color')} ? ' adm-input--error'"
                           class="adm-input" placeholder="e.g. Space Black" autofocus />
                    <span class="adm-field-error" th:if="${#fields.hasErrors('color')}" th:errors="*{color}"></span>
                </div>
                <div class="adm-form-field">
                    <label class="adm-form-label" for="specN">Spec <span class="adm-required">*</span></label>
                    <input type="text" id="specN" th:field="*{spec}"
                           th:classappend="${#fields.hasErrors('spec')} ? ' adm-input--error'"
                           class="adm-input" placeholder="e.g. 256GB" />
                    <span class="adm-field-error" th:if="${#fields.hasErrors('spec')}" th:errors="*{spec}"></span>
                </div>
            </div>

            <div class="adm-form-field">
                <label class="adm-form-label" for="priceN">Price (₫) <span class="adm-required">*</span></label>
                <input type="number" id="priceN" th:field="*{price}"
                       th:classappend="${#fields.hasErrors('price')} ? ' adm-input--error'"
                       class="adm-input adm-input--mono" placeholder="e.g. 28990000" min="1" step="any" />
                <span class="adm-field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
            </div>

            <div class="adm-form-field">
                <label class="adm-form-label">Status</label>
                <div class="adm-toggle-group">
                    <label class="adm-toggle-opt">
                        <input type="radio" th:field="*{status}" th:value="${true}" />
                        <span class="adm-toggle-label adm-toggle-label--green">Active</span>
                    </label>
                    <label class="adm-toggle-opt">
                        <input type="radio" th:field="*{status}" th:value="${false}" />
                        <span class="adm-toggle-label adm-toggle-label--red">Inactive</span>
                    </label>
                </div>
            </div>

            <div class="adm-form-actions">
                <button type="submit" class="adm-btn adm-btn--primary">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Create Variant
                </button>
                <a th:href="@{/admin/products/{id}/variants(id=${product.id})}" class="adm-btn adm-btn--ghost">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
