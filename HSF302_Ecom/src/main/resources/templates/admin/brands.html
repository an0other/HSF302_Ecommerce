<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::title}, 'Brands', ~{::main})}">
<head><title>Brands — Voltex Admin</title></head>
<body>
<main>

    <div class="adm-page-header">
        <div>
            <h1 class="adm-page-title">Brands</h1>
            <p class="adm-page-sub" th:text="${brandPage.totalElements} + ' brand(s) total'">0 brands</p>
        </div>
        <a th:href="@{/admin/brands/new}" class="adm-btn adm-btn--primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Brand
        </a>
    </div>

    <!-- Search -->
    <form th:action="@{/admin/brands}" method="get" class="adm-search-bar">
        <div class="adm-search-wrap">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" name="keyword" th:value="${keyword}" class="adm-search-input" placeholder="Search brands by name…" />
        </div>
        <button type="submit" class="adm-btn adm-btn--ghost">Search</button>
        <a th:if="${keyword != null and !keyword.isBlank()}" th:href="@{/admin/brands}" class="adm-btn adm-btn--ghost">Clear</a>
    </form>

    <!-- Table -->
    <div class="adm-table-card">
        <table class="adm-table">
            <thead>
            <tr>
                <th>#</th>
                <th>Brand Name</th>
                <th>Products</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(brandPage.content)}">
                <td colspan="5" class="adm-table-empty">No brands found.</td>
            </tr>
            <tr th:each="brand, s : ${brandPage.content}">
                <td class="adm-table-id" th:text="${brandPage.number * brandPage.size + s.index + 1}">1</td>
                <td>
                    <div class="adm-table-name" th:text="${brand.name}">Brand Name</div>
                </td>
                <td>
                <span class="adm-badge adm-badge--neutral"
                      th:text="${brand.products != null ? brand.products.size() : 0} + ' products'">0</span>
                </td>
                <td>
                    <span th:if="${brand.status}"    class="adm-badge adm-badge--green">Active</span>
                    <span th:unless="${brand.status}" class="adm-badge adm-badge--red">Inactive</span>
                </td>
                <td>
                    <div class="adm-table-actions">

                        <!-- Edit -->
                        <a th:href="@{/admin/brands/{id}/edit(id=${brand.id})}"
                           class="adm-action-btn" title="Edit brand">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>


    <!-- Pagination -->
    <div th:if="${brandPage.totalPages > 1}" class="adm-pagination" style="margin-top:16px;">
        <a th:if="${currentPage > 0}"
           th:href="@{/admin/brands(page=${currentPage - 1}, keyword=${keyword})}"
           class="adm-page-btn">← Prev</a>
        <th:block th:each="i : ${#numbers.sequence(0, brandPage.totalPages - 1)}">
            <a th:href="@{/admin/brands(page=${i}, keyword=${keyword})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? ' adm-page-btn--active'"
               class="adm-page-btn">1</a>
        </th:block>
        <a th:if="${currentPage < brandPage.totalPages - 1}"
           th:href="@{/admin/brands(page=${currentPage + 1}, keyword=${keyword})}"
           class="adm-page-btn">Next →</a>
    </div>

</main>
</body>
</html>
