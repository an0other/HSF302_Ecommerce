<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, pageTitle, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${title}">Admin — Voltex</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin-products.css}"/>
</head>
<body>

<div class="adm-shell">

    <!-- ── Sidebar ─────────────────────────────────────────── -->
    <aside class="adm-sidebar" id="admSidebar">
        <div class="adm-sidebar-logo">
            <a href="/" class="adm-logo-link">
                <span class="adm-logo-volt">VOLT</span><span class="adm-logo-ex">EX</span>
            </a>
            <span class="adm-logo-badge">Admin</span>
        </div>

        <nav class="adm-nav">
            <div class="adm-nav-label">Overview</div>
            <a th:href="@{/admin}"
               th:classappend="${section == 'dashboard'} ? ' adm-nav-item--active'"
               class="adm-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Dashboard
            </a>

            <div class="adm-nav-label" style="margin-top:16px;">Catalog</div>
            <a th:href="@{/admin/brands}"
               th:classappend="${section == 'brands'} ? ' adm-nav-item--active'"
               class="adm-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                Brands
            </a>
            <a th:href="@{/admin/categories}"
               th:classappend="${section == 'categories'} ? ' adm-nav-item--active'"
               class="adm-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                Categories
            </a>
            <a th:href="@{/admin/inventory}"
               th:classappend="${section == 'inventory'} ? ' adm-nav-item--active'"
               class="adm-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                Inventory
            </a>
            <a th:href="@{/admin/products}"
               th:classappend="${section == 'products'} ? ' adm-nav-item--active'"
               class="adm-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                Products
            </a>
            <div class="adm-nav-label" style="margin-top:16px;">Store</div>
            <a href="/products" target="_blank" class="adm-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                View Store
            </a>
            <a href="/logout" class="adm-nav-item adm-nav-item--danger">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sign Out
            </a>
        </nav>

        <div class="adm-sidebar-user">
            <div class="adm-user-avatar" th:text="${#strings.substring(session.loggedInUser.username, 0, 1)}">A</div>
            <div class="adm-user-info">
                <div class="adm-user-name" th:text="${session.loggedInUser.username}">admin</div>
                <div class="adm-user-role">Administrator</div>
            </div>
        </div>
    </aside>

    <!-- ── Main ───────────────────────────────────────────── -->
    <div class="adm-main">

        <!-- Topbar -->
        <header class="adm-topbar">
            <button class="adm-sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="adm-topbar-left">
                <a href="/admin" class="adm-topbar-logo">
                    <span class="adm-logo-volt">VOLT</span><span class="adm-logo-ex">EX</span>
                </a>
                <span class="adm-topbar-sep">/</span>
                <span class="adm-topbar-title" th:text="${pageTitle}">Admin Panel</span>
            </div>

        </header>

        <!-- Flash toast trigger -->
        <div th:if="${toast}" id="flashToast"
             th:data-type="${toastType}"
             th:data-msg="${toast}"
             style="display:none"></div>

        <!-- Page content -->
        <div class="adm-content" th:replace="${content}"></div>
    </div>
</div>

<!-- Toast container -->
<div id="toastContainer" class="adm-toast-container"></div>

<script th:src="@{/js/admin.js}"></script>
</body>
</html>
