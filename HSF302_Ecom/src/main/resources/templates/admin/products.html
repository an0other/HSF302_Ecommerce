<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::title}, 'Products', ~{::main})}">
<head><title>Products — Voltex Admin</title></head>
<body>
<main>

    <!-- ── Breadcrumb trail ──────────────────────── -->
    <div th:replace="~{admin/fragments/product-breadcrumb :: breadcrumb('products', null, null, null)}"></div>

    <div class="adm-page-header">
        <div>
            <h1 class="adm-page-title">Products</h1>
            <p class="adm-page-sub" th:text="${productPage.totalElements} + ' product(s) total'">0 products</p>
        </div>
        <a th:href="@{/admin/products/new}" class="adm-btn adm-btn--primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Product
        </a>
    </div>

    <!-- ── Filters ───────────────────────────────── -->
    <form th:action="@{/admin/products}" method="get" class="adm-search-bar">
        <div class="adm-search-wrap">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" name="keyword" th:value="${keyword}" class="adm-search-input" placeholder="Search products by name…" />
        </div>
        <select name="categoryId" class="adm-select">
            <option value="">All Categories</option>
            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                    th:selected="${categoryId != null and categoryId == cat.id}">Cat</option>
        </select>
        <select name="brandId" class="adm-select">
            <option value="">All Brands</option>
            <option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}"
                    th:selected="${brandId != null and brandId == b.id}">Brand</option>
        </select>
        <button type="submit" class="adm-btn adm-btn--ghost">Filter</button>
        <a th:href="@{/admin/products}" class="adm-btn adm-btn--ghost">Reset</a>
    </form>

    <!-- ── Table ─────────────────────────────────── -->
    <div class="adm-table-card">
        <table class="adm-table">
            <thead>
            <tr>
                <th>#</th>
                <th>Product Name</th>
                <th>Category / Brand</th>
                <th>Variants</th>
                <th class="adm-th-center">From Price</th>
                <th class="adm-th-center">Stock</th>
                <th class="adm-th-center">Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(productPage.content)}">
                <td colspan="8" class="adm-table-empty">No products found.</td>
            </tr>
            <tr th:each="row, s : ${productPage.content}"
                th:classappend="${!row.status} ? 'adm-row--inactive'">
                <td class="adm-table-id" th:text="${productPage.number * productPage.size + s.index + 1}">1</td>
                <td>
                    <div class="adm-table-name" th:text="${row.name}">Product</div>
                </td>
                <td>
                    <div class="adm-meta-stack">
                        <span th:text="${row.categoryName}">Cat</span>
                        <span class="adm-meta-sep">·</span>
                        <span th:text="${row.brandName}">Brand</span>
                    </div>
                </td>
                <td>
                    <span class="adm-badge adm-badge--neutral" th:text="${row.variantCount} + ' variant' + (${row.variantCount == 1} ? '' : 's')">0</span>
                </td>
                <td class="adm-td-center">
                    <span class="adm-price" th:text="${row.priceFormatted}">—</span>
                </td>
                <td class="adm-td-center">
                    <span th:if="${row.totalStock <= 0}"   class="adm-avail adm-avail--out"  th:text="${row.totalStock}">0</span>
                    <span th:if="${row.totalStock > 0 and row.totalStock <= 10}" class="adm-avail adm-avail--low" th:text="${row.totalStock}">0</span>
                    <span th:if="${row.totalStock > 10}"   class="adm-avail adm-avail--ok"   th:text="${row.totalStock}">0</span>
                </td>
                <td class="adm-td-center">
                    <span th:if="${row.status}"  class="adm-badge adm-badge--green">Active</span>
                    <span th:unless="${row.status}" class="adm-badge adm-badge--red">Inactive</span>
                </td>
                <td>
                    <div class="adm-table-actions adm-table-actions--text">
                        <!-- Manage variants -->
                        <a th:href="@{/admin/products/{id}/variants(id=${row.id})}"
                           class="adm-text-btn adm-text-btn--blue">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                            Variants
                        </a>
                        <!-- Edit -->
                        <a th:href="@{/admin/products/{id}/edit(id=${row.id})}"
                           class="adm-text-btn">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            Edit
                        </a>
                        <!-- Soft delete -->
                        <form th:action="@{/admin/products/{id}/delete(id=${row.id})}" method="post" style="display:inline">
                            <button type="button"
                                    th:data-product-name="${row.name}"
                                    th:classappend="${row.totalStock > 0} ? ' adm-text-btn--blocked'"
                                    class="adm-text-btn adm-text-btn--danger"
                                    onclick="confirmDelete(this, 'product')">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                                Deactivate
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- ── Pagination ────────────────────────────── -->
    <div th:if="${productPage.totalPages > 1}" class="adm-pagination" style="margin-top:16px;">
        <a th:if="${currentPage > 0}"
           th:href="@{/admin/products(page=${currentPage - 1},keyword=${keyword},categoryId=${categoryId},brandId=${brandId})}"
           class="adm-page-btn">← Prev</a>
        <th:block th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}">
            <a th:href="@{/admin/products(page=${i},keyword=${keyword},categoryId=${categoryId},brandId=${brandId})}"
               th:text="${i + 1}" th:classappend="${i == currentPage} ? ' adm-page-btn--active'"
               class="adm-page-btn">1</a>
        </th:block>
        <a th:if="${currentPage < productPage.totalPages - 1}"
           th:href="@{/admin/products(page=${currentPage + 1},keyword=${keyword},categoryId=${categoryId},brandId=${brandId})}"
           class="adm-page-btn">Next →</a>
    </div>

    <!-- ── Confirm modal ─────────────────────────── -->
    <div class="adm-modal-overlay" id="deleteModal" style="display:none">
        <div class="adm-modal">
            <div class="adm-modal-header">
                <h3 class="adm-modal-title" id="deleteModalTitle">Deactivate?</h3>
                <button class="adm-modal-close" onclick="document.getElementById('deleteModal').style.display='none'">&#x2715;</button>
            </div>
            <p class="adm-modal-sub" id="deleteModalSub">This will set the item to inactive.</p>
            <div class="adm-form-actions">
                <button id="deleteConfirmBtn" class="adm-btn adm-btn--primary" style="background:var(--adm-red);border-color:var(--adm-red)">Deactivate</button>
                <button class="adm-btn adm-btn--ghost" onclick="document.getElementById('deleteModal').style.display='none'">Cancel</button>
            </div>
        </div>
    </div>

</main>

<style>
    .adm-row--inactive td { opacity: .55; }
</style>

<script>
    function confirmDelete(btn, type) {
        const name = btn.dataset.productName || 'this item';
        document.getElementById('deleteModalTitle').textContent = 'Deactivate ' + type + '?';
        document.getElementById('deleteModalSub').textContent = 'Are you sure you want to deactivate "' + name + '"? It can be re-activated later via the edit form.';
        const form = btn.closest('form');
        document.getElementById('deleteConfirmBtn').onclick = function() { form.submit(); };
        document.getElementById('deleteModal').style.display = 'flex';
    }
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) this.style.display = 'none';
    });
</script>
</body>
</html>
