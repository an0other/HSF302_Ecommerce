<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::title}, 'Categories', ~{::main})}">
<head><title>Categories — Voltex Admin</title></head>
<body>
<main>

    <div class="adm-page-header">
        <div>
            <h1 class="adm-page-title">Categories</h1>
            <p class="adm-page-sub" th:text="${categoryPage.totalElements} + ' category(ies) total'">0 categories</p>
        </div>
        <a th:href="@{/admin/categories/new}" class="adm-btn adm-btn--primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Category
        </a>
    </div>

    <!-- Search -->
    <form th:action="@{/admin/categories}" method="get" class="adm-search-bar">
        <div class="adm-search-wrap">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" name="keyword" th:value="${keyword}" class="adm-search-input" placeholder="Search categories by name…" />
        </div>
        <button type="submit" class="adm-btn adm-btn--ghost">Search</button>
        <a th:if="${keyword != null and !keyword.isBlank()}" th:href="@{/admin/categories}" class="adm-btn adm-btn--ghost">Clear</a>
    </form>

    <!-- Table -->
    <div class="adm-table-card">
        <table class="adm-table">
            <thead>
            <tr>
                <th>#</th>
                <th>Category Name</th>
                <th>Products</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(categoryPage.content)}">
                <td colspan="5" class="adm-table-empty">No categories found.</td>
            </tr>
            <tr th:each="cat, s : ${categoryPage.content}">
                <td class="adm-table-id" th:text="${categoryPage.number * categoryPage.size + s.index + 1}">1</td>
                <td>
                    <div class="adm-table-name" th:text="${cat.name}">Category</div>
                </td>
                <td>
                    <span class="adm-badge adm-badge--neutral"
                          th:text="${cat.products != null ? cat.products.size() : 0} + ' products'">0</span>
                </td>
                <td>
                    <span th:if="${cat.status}"    class="adm-badge adm-badge--green">Active</span>
                    <span th:unless="${cat.status}" class="adm-badge adm-badge--red">Inactive</span>
                </td>
                <td>
                    <div class="adm-table-actions adm-table-actions--text">
                        <a th:href="@{/admin/categories/{id}/edit(id=${cat.id})}"
                           class="adm-text-btn">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            Edit
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div th:if="${categoryPage.totalPages > 1}" class="adm-pagination" style="margin-top:16px;">
        <a th:if="${currentPage > 0}"
           th:href="@{/admin/categories(page=${currentPage - 1}, keyword=${keyword})}"
           class="adm-page-btn">← Prev</a>
        <th:block th:each="i : ${#numbers.sequence(0, categoryPage.totalPages - 1)}">
            <a th:href="@{/admin/categories(page=${i}, keyword=${keyword})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? ' adm-page-btn--active'"
               class="adm-page-btn">1</a>
        </th:block>
        <a th:if="${currentPage < categoryPage.totalPages - 1}"
           th:href="@{/admin/categories(page=${currentPage + 1}, keyword=${keyword})}"
           class="adm-page-btn">Next →</a>
    </div>

</main>
</body>
</html>
